services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/user-service/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://postgres:postgres@postgres:5432/user_service?sslmode=disable"
      - "up"

  user-service:
    build:
      context: ./backend/user-service
    env_file:
      - ./backend/user-service/.env
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: user_service
      DB_SSLMODE: disable
      DB_TIMEZONE: UTC
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/api/v1/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8081:8081"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./backend/api-gateway-service
    env_file:
      - ./backend/api-gateway-service/.env
    environment:
      SERVER_PORT: 8080
      GIN_MODE: debug
      JWT_ACCESS_SECRET: dev-access-secret
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres_data:
